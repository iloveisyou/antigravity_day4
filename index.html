<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정 일기</title>
  <!-- Google Fonts: Outfit & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Auth Container -->
  <div id="auth-container" class="app-container hidden">
    <header class="app-header">
      <div class="logo">
        <span class="logo-emoji">✨</span>
        <span class="logo-text">MindFlow</span>
      </div>
      <h1 class="main-title">AI 감정 일기</h1>
      <p class="subtitle">오늘의 감정을 기록하고 따뜻한 위로를 받아보세요.</p>
    </header>

    <main class="app-main">
      <div class="diary-card auth-card">
        <form id="auth-form" class="auth-form">
          <div class="input-group">
            <label for="auth-email" class="input-label">이메일</label>
            <input type="email" id="auth-email" class="auth-input" placeholder="email@example.com" required>
          </div>
          <div class="input-group">
            <label for="auth-password" class="input-label">비밀번호</label>
            <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호를 입력하세요" required>
          </div>
          <div class="auth-buttons">
            <button type="submit" id="btn-login" class="btn btn-primary">로그인</button>
            <button type="button" id="btn-signup" class="btn btn-secondary">회원가입</button>
          </div>
        </form>
        
        <div class="auth-divider">
          <span>또는</span>
        </div>
        
        <button id="btn-google-login" class="btn btn-google" type="button">
          <svg class="btn-icon google-icon" viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.532 0-6.4-2.868-6.4-6.4s2.868-6.4 6.4-6.4c1.582 0 3.02.574 4.135 1.524l3.115-3.115C19.296 2.378 15.983 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.079 0 11.24-4.382 11.24-11.24 0-.743-.072-1.46-.19-2.155H12.24z"/>
          </svg>
          Google로 로그인
        </button>
      </div>
    </main>
    
    <footer class="app-footer">
      <p>&copy; 2026 MindFlow. All rights reserved.</p>
    </footer>
  </div>

  <!-- Main Diary App Container -->
  <div id="diary-app-container" class="app-container hidden">
    <header class="app-header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-emoji">✨</span>
          <span class="logo-text">MindFlow</span>
        </div>
        <div class="user-status-wrapper">
          <span id="user-email-display" class="user-email"></span>
          <button id="btn-logout" class="btn btn-logout" type="button">로그아웃</button>
        </div>
      </div>
      <h1 class="main-title">오늘의 하루는 어땠나요?</h1>
      <p class="subtitle">오늘 느낀 감정과 생각들을 자유롭게 적어주세요. AI가 당신의 하루를 함께 나눕니다.</p>
    </header>

    <main class="app-main">
      <div class="diary-card">
        <div class="input-wrapper">
          <textarea id="diary-input" placeholder="여기에 일기를 입력하거나 음성으로 작성해보세요..." rows="8"></textarea>
          <div class="char-counter"><span id="current-char-count">0</span>자</div>
        </div>

        <div class="button-group">
          <button id="voice-input-btn" class="btn btn-secondary" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
              <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
              <line x1="12" x2="12" y1="19" y2="22" />
            </svg>
            음성으로 입력하기
          </button>
          <button id="analyze-btn" class="btn btn-primary" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" x2="12" y1="22.08" y2="12" />
            </svg>
            분석 요청하기
          </button>
        </div>
      </div>

      <section class="result-section">
        <h2 class="section-title">AI의 답변</h2>
        <div id="ai-response-box" class="response-box">
          <p class="placeholder-text">여기에 AI의 답변이 표시됩니다.</p>
        </div>
      </section>

      <section class="history-section">
        <h2 class="section-title">나의 일기 히스토리</h2>
        <div id="history-container" class="history-container">
          <p class="placeholder-text">저장된 일기 내역이 없습니다.</p>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; 2026 MindFlow. All rights reserved.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>

</html>
