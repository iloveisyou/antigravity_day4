<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정 일기</title>
  <!-- Google Fonts: Outfit & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <span class="logo-emoji">✨</span>
        <span class="logo-text">MindFlow</span>
      </div>
      <h1 class="main-title">오늘의 하루는 어땠나요?</h1>
      <p class="subtitle">오늘 느낀 감정과 생각들을 자유롭게 적어주세요. AI가 당신의 하루를 함께 나눕니다.</p>
    </header>

    <main class="app-main">
      <div class="diary-card">
        <div class="input-wrapper">
          <textarea id="diary-input" placeholder="여기에 일기를 입력하거나 음성으로 작성해보세요..." rows="8"></textarea>
          <div class="char-counter"><span id="current-char-count">0</span>자</div>
        </div>

        <div class="button-group">
          <button id="voice-input-btn" class="btn btn-secondary" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
              <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
              <line x1="12" x2="12" y1="19" y2="22" />
            </svg>
            음성으로 입력하기
          </button>
          <button id="analyze-btn" class="btn btn-primary" type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" x2="12" y1="22.08" y2="12" />
            </svg>
            분석 요청하기
          </button>
        </div>
      </div>

      <section class="result-section">
        <h2 class="section-title">AI의 답변</h2>
        <div id="ai-response-box" class="response-box">
          <p class="placeholder-text">여기에 AI의 답변이 표시됩니다.</p>
        </div>
      </section>

      <section class="history-section">
        <h2 class="section-title">나의 일기 히스토리</h2>
        <div id="history-container" class="history-container">
          <p class="placeholder-text">저장된 일기 내역이 없습니다.</p>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; 2026 MindFlow. All rights reserved.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>

</html>
